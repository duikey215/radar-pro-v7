<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Pro V7 | Master Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .card-slider { 
            display: flex; overflow-x: auto; gap: 1.25rem; 
            scroll-snap-type: x mandatory; padding: 1rem 0.5rem;
        }
        .slider-item { 
            flex: 0 0 88%; scroll-snap-align: center;
            background: white; border-radius: 1.25rem; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border-top: 5px solid #3b82f6; padding: 1.5rem;
        }
        @media (min-width: 1024px) { .slider-item { flex: 0 0 31%; } }
        .badge { display: flex; align-items: center; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 0.75rem; font-weight: 600; font-size: 0.875rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Hero Section -->
        <div class="hero-bg rounded-3xl p-10 text-center shadow-2xl mb-8">
            <h1 class="text-white text-4xl md:text-5xl font-black italic">🧿 RADAR <span class="text-blue-500">PRO</span></h1>
            <p class="text-slate-400 mt-3 text-lg">Master 50-Page AdSense Master Audit Engine</p>
        </div>

        <!-- Input Area -->
        <div class="bg-white p-2 rounded-2xl shadow-lg flex flex-col md:flex-row gap-2 mb-10">
            <input id="urlInput" type="text" placeholder="Enter website (e.g. mysite.com)" class="flex-1 p-4 outline-none text-lg font-semibold">
            <button onclick="runAudit()" id="mainBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-10 py-4 rounded-xl transition-all active:scale-95">🚀 START DEEP AUDIT</button>
        </div>

        <!-- Dashboard (Hidden Initially) -->
        <div id="dashboard" class="hidden animate-fade-in">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow text-center border-b-4 border-blue-500">
                    <p class="text-xs font-bold text-slate-400 uppercase">Approval Odds</p>
                    <h2 id="odds" class="text-4xl font-black text-slate-800">0%</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow text-center border-b-4 border-slate-300">
                    <p class="text-xs font-bold text-slate-400 uppercase">Posts Found</p>
                    <h2 id="totalPosts" class="text-4xl font-black text-slate-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow text-center border-b-4 border-slate-300">
                    <p class="text-xs font-bold text-slate-400 uppercase">Avg Words</p>
                    <h2 id="avgWords" class="text-4xl font-black text-slate-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow text-center border-b-4 border-slate-300">
                    <p class="text-xs font-bold text-slate-400 uppercase">Audit Time</p>
                    <h2 id="time" class="text-4xl font-black text-slate-800">0s</h2>
                </div>
            </div>

            <!-- Pill Menu -->
            <div class="flex gap-3 overflow-x-auto hide-scroll mb-6">
                <button onclick="slide(0)" class="bg-white border px-6 py-2 rounded-full font-bold shadow-sm whitespace-nowrap">⚙️ Tech</button>
                <button onclick="slide(1)" class="bg-white border px-6 py-2 rounded-full font-bold shadow-sm whitespace-nowrap">🛡️ Policy</button>
                <button onclick="slide(2)" class="bg-white border px-6 py-2 rounded-full font-bold shadow-sm whitespace-nowrap">📝 Content</button>
            </div>

            <!-- Swipeable Carousel -->
            <div class="card-slider hide-scroll" id="carousel">
                <div class="slider-item">
                    <h3 class="text-xl font-black mb-4 border-b pb-2">⚙️ Technical Health</h3>
                    <div id="techContent"></div>
                </div>
                <div class="slider-item">
                    <h3 class="text-xl font-black mb-4 border-b pb-2">🛡️ Policy Compliance</h3>
                    <div id="policyContent"></div>
                </div>
                <div class="slider-item">
                    <h3 class="text-xl font-black mb-4 border-b pb-2">📝 Content & SEO</h3>
                    <div id="seoContent"></div>
                </div>
            </div>

            <!-- Authority Advice -->
            <div class="mt-10 bg-white p-8 rounded-3xl shadow-xl border-2 border-slate-100">
                <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter text-slate-800">📋 Official Auditor's Advice</h2>
                <div id="adviceItems" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        function slide(index) {
            const carousel = document.getElementById('carousel');
            const width = carousel.offsetWidth;
            carousel.scrollTo({ left: index * width * 0.9, behavior: 'smooth' });
        }

        async function runAudit() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Please enter a URL");

            const btn = document.getElementById('mainBtn');
            btn.innerText = "🌀 SCANNING 50 PAGES...";
            btn.disabled = true;

            try {
                const res = await fetch(`/api/audit?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('odds').innerText = data.score + "%";
                document.getElementById('odds').style.color = data.score > 70 ? 'green' : 'red';
                document.getElementById('totalPosts').innerText = data.pages_discovered;
                document.getElementById('avgWords').innerText = data.avg_words;
                document.getElementById('time').innerText = data.load_time + "s";

                // Badges rendering
                const tech = `
                    <div class="badge ${data.has_ssl ? 'bg-green-50 text-green-700 border-l-4 border-green-500' : 'bg-red-50 text-red-700 border-l-4 border-red-500'}">
                        ${data.has_ssl ? '✅ HTTPS SSL Secure' : '❌ SSL Certificate Missing'}
                    </div>
                    <div class="badge ${data.redirect_loops == 0 ? 'bg-green-50 text-green-700 border-l-4 border-green-500' : 'bg-red-50 text-red-700 border-l-4 border-red-500'}">
                        ${data.redirect_loops == 0 ? '✅ Healthy Architecture' : '❌ Redirect Loops Detected'}
                    </div>
                `;
                document.getElementById('techContent').innerHTML = tech;

                const pol = `
                    <div class="badge ${data.essentials_count >= 4 ? 'bg-green-50 text-green-700 border-l-4 border-green-500' : 'bg-yellow-50 text-yellow-700 border-l-4 border-yellow-500'}">
                        📜 Policy Pages: ${data.essentials_count}/5 Found
                    </div>
                    <div class="badge ${data.has_adsense ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-500' : 'bg-slate-50 text-slate-700 border-l-4 border-slate-500'}">
                        🤖 AdSense Code: ${data.has_adsense ? 'Present' : 'Not Detected'}
                    </div>
                `;
                document.getElementById('policyContent').innerHTML = pol;

                const seo = `
                    <div class="badge ${data.avg_words >= 600 ? 'bg-green-50 text-green-700 border-l-4 border-green-500' : 'bg-red-50 text-red-700 border-l-4 border-red-500'}">
                        ✍️ Content Depth: ${data.avg_words} Avg Words
                    </div>
                    <div class="badge ${data.has_sitemap ? 'bg-green-50 text-green-700 border-l-4 border-green-500' : 'bg-red-50 text-red-700 border-l-4 border-red-500'}">
                        🗺️ Sitemap Index: ${data.has_sitemap ? 'Found' : 'Missing'}
                    </div>
                `;
                document.getElementById('seoContent').innerHTML = seo;

                // Advice Rendering
                let advHtml = "";
                if(data.advice.length === 0) {
                    advHtml = `<div class="bg-green-50 p-5 rounded-2xl border-l-8 border-green-500 font-bold text-green-800 text-lg">🎉 Congratulations! Your site is practically perfect. You can apply for AdSense now.</div>`;
                } else {
                    data.advice.forEach((a, i) => {
                        advHtml += `<div class="bg-red-50 p-4 rounded-xl border-l-4 border-red-500 font-semibold text-red-800">${i+1}. ${a}</div>`;
                    });
                }
                document.getElementById('adviceItems').innerHTML = advHtml;

            } catch (e) {
                alert("Audit Failed. Please check URL.");
            } finally {
                btn.innerText = "🚀 START DEEP AUDIT";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
